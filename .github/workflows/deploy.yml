name: Deploy to CyberPanel

on:
  push:
    branches:
      - main
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: mbstring, xml, ctype, iconv, intl, pdo, pdo_mysql, dom, filter, gd, iconv, json, mbstring

      - name: Install Composer Dependencies
        run: composer install --optimize-autoloader --no-dev --no-progress --no-suggest

      - name: Sync files to server via rsync
        uses: easingthemes/ssh-deploy@main
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SERVER_SSH_KEY }}
          SSH_PASSWORD: ${{ secrets.SERVER_PASSWORD }}
          ARGS: "-avz --delete --exclude='.git/' --exclude='.github/' --exclude='.env' --exclude='storage/'"
          SOURCE: "./"
          REMOTE_HOST: ${{ secrets.SERVER_HOST }}
          REMOTE_USER: ${{ secrets.SERVER_USERNAME }}
          REMOTE_PORT: ${{ secrets.SERVER_PORT }}
          TARGET: "/home/stream.my-communication.uk/public_html"

      - name: Execute post-deploy Commands on Server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USERNAME }}
          password: ${{ secrets.SERVER_PASSWORD }}
          port: ${{ secrets.SERVER_PORT }}
          script_stop: true
          script: |
            echo "Starting Post-Deployment Tasks..."
            
            cd /home/stream.my-communication.uk/public_html
            
            # Run Database Migrations
            echo "Running Migrations..."
            php artisan migrate --force
            
            # Clear and Cache configuration and routes for faster performance
            echo "Caching Config and Routes..."
            php artisan optimize:clear
            php artisan config:cache
            php artisan route:cache
            php artisan view:cache
            
            # Ensure storage is linked
            php artisan storage:link || true
            
            # Ensure correct file permissions
            chown -R stream.my-communication.uk:stream.my-communication.uk /home/stream.my-communication.uk/public_html
            chmod -R ugo+rw storage bootstrap/cache
            
            echo "Deployment Completed Successfully!"
