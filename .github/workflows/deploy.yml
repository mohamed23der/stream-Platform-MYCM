name: Deploy to CyberPanel

on:
  push:
    branches:
      - main
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: mbstring, xml, ctype, iconv, intl, pdo, pdo_mysql, dom, filter, gd, iconv, json, mbstring

      - name: Install Composer Dependencies
        run: composer install --optimize-autoloader --no-dev --no-progress --no-suggest

      - name: Remove files that shouldn't be deployed
        run: |
          rm -rf .git
          rm -rf .github
          rm -rf storage/logs/*
          rm -rf storage/framework/cache/data/*
          rm -rf storage/framework/sessions/*
          rm -rf storage/framework/testing/*
          rm -rf storage/framework/views/*

      - name: Copy files via SCP
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USERNAME }}
          password: ${{ secrets.SERVER_PASSWORD }}
          port: ${{ secrets.SERVER_PORT }}
          source: "."
          target: "/home/stream.my-communication.uk/public_html"
          strip_components: 0
          rm: false

      - name: Execute post-deploy Commands on Server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USERNAME }}
          password: ${{ secrets.SERVER_PASSWORD }}
          port: ${{ secrets.SERVER_PORT }}
          script_stop: true
          script: |
            echo "Starting Post-Deployment Tasks..."
            
            cd /home/stream.my-communication.uk/public_html
            
            # Run Database Migrations
            echo "Running Migrations..."
            php artisan migrate --force
            
            # Clear and Cache configuration and routes for faster performance
            echo "Caching Config and Routes..."
            php artisan optimize:clear
            php artisan config:cache
            php artisan route:cache
            php artisan view:cache
            
            # Ensure storage is linked
            php artisan storage:link || true
            
            # Ensure correct file permissions
            chown -R stream.my-communication.uk:stream.my-communication.uk /home/stream.my-communication.uk/public_html
            chmod -R ugo+rw storage bootstrap/cache
            
            echo "Deployment Completed Successfully!"
