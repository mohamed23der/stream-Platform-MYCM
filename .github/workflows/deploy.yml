name: Deploy to CyberPanel

on:
  push:
    branches:
      - main
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Execute Deployment Commands on Server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USERNAME }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT }}
          script_stop: true
          script: |
            echo "Starting Deployment via Git Pull..."
            
            # Navigate to the project directory
            cd /home/stream.my-communication.uk/public_html
            
            # Fetch the latest changes and reset to overwrite any local modifications
            git fetch origin
            git reset --hard origin/main
            
            # Install/Update PHP Dependencies
            echo "Running Composer Install..."
            composer install --optimize-autoloader --no-dev
            
            # Run Database Migrations
            echo "Running Migrations..."
            php artisan migrate --force
            
            # Clear and Cache configuration and routes for faster performance
            echo "Caching Config and Routes..."
            php artisan optimize:clear
            php artisan config:cache
            php artisan route:cache
            php artisan view:cache
            
            # Ensure storage is linked
            php artisan storage:link || true
            
            # Ensure correct file permissions
            chown -R stream.my-communication.uk:stream.my-communication.uk /home/stream.my-communication.uk/public_html
            chmod -R ugo+rw storage bootstrap/cache
            
            echo "Deployment Completed Successfully!"
